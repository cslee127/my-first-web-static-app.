let activeFilter = 'all';

function getTools(phId, dmId) {
  return TOOLS.filter(t => t.ph===phId && t.dm===dmId &&
    (activeFilter==='all' || t.st===activeFilter));
}

function buildMatrix() {
  const tbl = document.getElementById('mainMatrix');
  let thead = '<thead><tr><th style="min-width:95px;text-align:left;padding:8px">大分類</th>';
  PHASES.forEach(p => {
    const cls = p.id==='8' ? ' class="glue-col"' : '';
    thead += `<th${cls} style="min-width:88px">${p.label}<br><span style="font-size:9px;opacity:0.7">${p.en}</span></th>`;
  });
  thead += '</tr></thead>';

  let tbody = '<tbody>';
  DOMAINS.forEach(d => {
    const hasAny = PHASES.some(p => getTools(p.id, d.id).length > 0);
    if (!hasAny) return;
    tbody += '<tr>';
    tbody += `<td class="domain-cell" style="background:${d.color}">${d.id}<br><span class="domain-en">${d.en}</span></td>`;
    PHASES.forEach(p => {
      const tools = getTools(p.id, d.id);
      if (!tools.length) { tbody += '<td class="tool-cell empty"></td>'; return; }
      const subs = {};
      tools.forEach(t => { if(!subs[t.sub]) subs[t.sub]=[]; subs[t.sub].push(t); });
      let inner = '';
      Object.entries(subs).forEach(([sub, ts]) => {
        inner += `<div class="sub-group"><div class="sub-label">${sub}</div>`;
        ts.forEach(t => {
          const [,scls] = STATUS[t.st]||['?','s1'];
          const esc = t.name.replace(/'/g,"\\'");
          const phEsc = p.id;
          const dmEsc = d.id.replace(/'/g,"\\'");
          const subEsc = sub.replace(/'/g,"\\'");
          inner += `<span class="tool-tag ${scls}" onclick="openModal('${phEsc}','${dmEsc}','${subEsc}')" title="${esc}">${t.name.length>20?t.name.substring(0,19)+'…':t.name}</span>`;
        });
        inner += '</div>';
      });
      tbody += `<td class="tool-cell" style="background:${d.color}99">${inner}</td>`;
    });
    tbody += '</tr>';
  });
  tbody += '</tbody>';
  tbl.innerHTML = thead + tbody;
}

function buildPhaseFlow() {
  const el = document.getElementById('phaseFlow');
  PHASES.forEach((p, i) => {
    const cnt = TOOLS.filter(t => t.ph===p.id).length;
    const pill = document.createElement('div');
    pill.className = 'phase-pill';
    pill.style.cssText = `background:${p.color};color:white`;
    pill.innerHTML = `<span class="phase-count">${cnt}</span>${p.label}<br><span class="phase-sub">${p.en}</span>`;
    el.appendChild(pill);
    if (i < PHASES.length-1) {
      const arr = document.createElement('div');
      arr.className = 'phase-arrow';
      arr.textContent = i===6 ? '↩' : '→';
      el.appendChild(arr);
    }
  });
}

function buildSummary() {
  const total = TOOLS.length;
  const deployed = TOOLS.filter(t=>['4','5','6','7'].includes(t.st)).length;
  const inDev = TOOLS.filter(t=>['2','3'].includes(t.st)).length;
  const withAI = TOOLS.filter(t=>t.ai&&t.ai.trim()).length;
  const planned = TOOLS.filter(t=>t.st==='1').length;
  document.getElementById('summaryRow').innerHTML = `
    <div class="stat-card"><div class="n">${total}</div><div class="lbl">Total AI Tools</div></div>
    <div class="stat-card"><div class="n" style="color:#22c55e">${deployed}</div><div class="lbl">Deployed / In Use</div></div>
    <div class="stat-card"><div class="n" style="color:#f97316">${inDev}</div><div class="lbl">In Dev / Testing</div></div>
    <div class="stat-card"><div class="n" style="color:#94a3b8">${planned}</div><div class="lbl">Planned</div></div>
    <div class="stat-card"><div class="n" style="color:#6366f1">${withAI}</div><div class="lbl">Uses Named AI Engine</div></div>
    <div class="stat-card"><div class="n" style="color:#2563eb">8</div><div class="lbl">NPI Phases Covered</div></div>
  `;
}

function openModal(phId, dmId, sub) {
  const phase = PHASES.find(p=>p.id===phId);
  const tools = TOOLS.filter(t=>t.ph===phId && t.dm===dmId && (!sub||t.sub===sub));
  if (!tools.length) return;
  document.getElementById('modalTitle').textContent = `${phase?.label||phId} › ${dmId}${sub?' › '+sub:''}`;
  const subs = {};
  tools.forEach(t=>{ if(!subs[t.sub]) subs[t.sub]=[]; subs[t.sub].push(t); });
  let html = '';
  Object.entries(subs).forEach(([s,ts])=>{
    html += `<div style="font-size:10px;font-weight:700;color:#64748b;margin:10px 0 4px;text-transform:uppercase">${s}</div>`;
    ts.forEach(t=>{
      const [slabel,scls] = STATUS[t.st]||['?','s1'];
      html += `<div class="modal-tool"><span class="status-badge ${scls}">${slabel}</span><div><div class="name">${t.name}</div>${t.ai?`<div class="ai-tag">🤖 ${t.ai}</div>`:''}</div></div>`;
    });
  });
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.f;
    buildMatrix();
  });
});

document.getElementById('modalOverlay').addEventListener('click', e=>{
  if (e.target===document.getElementById('modalOverlay')) closeModal();
});

buildPhaseFlow();
buildSummary();
buildMatrix();
</script>
