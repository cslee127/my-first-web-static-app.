<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>零件生命週期影響因素查詢系統</title>
<style>
  :root {
    --primary: #1e3a5f;
    --primary-light: #2d5a8e;
    --accent: #e8a020;
    --bg: #f0f4f8;
    --card-bg: #ffffff;
    --text: #1a2332;
    --text-secondary: #5a6a7e;
    --border: #d0dae6;
    --shadow: 0 2px 12px rgba(30,58,95,0.10);
    --shadow-hover: 0 6px 24px rgba(30,58,95,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Microsoft JhengHei', 'PingFang TC', Arial, sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    background: linear-gradient(135deg, #1e3a5f 0%, #2d5a8e 100%);
    color: #fff; padding: 14px 24px; display: flex; align-items: center; gap: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25); flex-shrink: 0;
  }
  header .logo { font-size: 26px; }
  header h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.4px; }
  header .subtitle { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 2px; }
  header .stats { margin-left: auto; font-size: 12px; color: rgba(255,255,255,0.75); text-align: right; line-height: 1.8; }
  main { display: flex; flex: 1; overflow: hidden; }

  /* ── Left Panel ── */
  .left-panel {
    width: 330px; background: var(--card-bg);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .search-area { padding: 14px 12px 10px; border-bottom: 1px solid var(--border); }
  .search-box {
    display: flex; align-items: center; background: #f5f8fb;
    border: 1.5px solid var(--border); border-radius: 8px;
    padding: 8px 12px; gap: 8px; transition: border-color 0.2s;
  }
  .search-box:focus-within { border-color: #2d5a8e; box-shadow: 0 0 0 3px rgba(45,90,142,0.1); }
  .search-box input { flex: 1; border: none; background: transparent; font-size: 14px; color: var(--text); outline: none; }
  .search-box .clear-btn {
    background: none; border: none; cursor: pointer; color: #8899aa;
    font-size: 15px; padding: 0; line-height: 1; display: none;
  }
  .filter-tabs { display: flex; padding: 10px 12px 6px; gap: 6px; }
  .filter-tab {
    flex: 1; padding: 5px 4px; border-radius: 6px; font-size: 11px; font-weight: 700;
    cursor: pointer; border: 1.5px solid; transition: all 0.18s; text-align: center;
    white-space: nowrap;
  }
  .filter-tab.all { border-color: #2d5a8e; color: #2d5a8e; }
  .filter-tab.all.active { background: #2d5a8e; color: #fff; }
  .filter-tab.active-comp { border-color: #c0392b; color: #c0392b; }
  .filter-tab.active-comp.active { background: #c0392b; color: #fff; }
  .filter-tab.passive-comp { border-color: #1e8449; color: #1e8449; }
  .filter-tab.passive-comp.active { background: #1e8449; color: #fff; }
  .filter-tab.other-comp { border-color: #7f8c8d; color: #7f8c8d; }
  .filter-tab.other-comp.active { background: #7f8c8d; color: #fff; }
  .result-count { padding: 4px 12px 2px; font-size: 11px; color: #8899aa; }
  .result-list { flex: 1; overflow-y: auto; padding: 4px 8px 8px; }
  .result-item {
    padding: 9px 11px; border-radius: 8px; cursor: pointer; margin-bottom: 2px;
    border: 1.5px solid transparent; transition: all 0.15s;
  }
  .result-item:hover { background: #eef4fb; border-color: #b8d0e8; }
  .result-item.selected { background: #ddeefa; border-color: #2d5a8e; }
  .item-name { font-size: 12.5px; font-weight: 600; color: var(--text); line-height: 1.4; }
  .item-meta { display: flex; gap: 5px; margin-top: 5px; align-items: center; flex-wrap: wrap; }
  .badge {
    font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; white-space: nowrap;
  }
  .badge-active { background: #fde8e8; color: #c0392b; }
  .badge-passive { background: #e3f7ee; color: #1e8449; }
  .badge-other { background: #f0f0f0; color: #5d6d7e; }
  .no-results { padding: 40px 16px; text-align: center; color: #8899aa; font-size: 13px; }

  /* ── Right Panel ── */
  .right-panel { flex: 1; overflow-y: auto; padding: 20px 22px; }
  .placeholder {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: #b0bec5; gap: 16px;
  }
  .placeholder p { font-size: 15px; }
  .detail-view { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .detail-header {
    background: var(--card-bg); border-radius: 12px; padding: 18px 22px;
    box-shadow: var(--shadow); margin-bottom: 14px; border-left: 4px solid #2d5a8e;
  }
  .detail-header h2 { font-size: 16px; font-weight: 700; line-height: 1.5; }
  .detail-header .meta { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; align-items: center; }

  .lifecycle-card {
    background: var(--card-bg); border-radius: 12px; padding: 18px 22px;
    box-shadow: var(--shadow); margin-bottom: 14px;
  }
  .section-title {
    font-size: 11.5px; font-weight: 700; color: #8899aa;
    text-transform: uppercase; letter-spacing: 0.9px; margin-bottom: 14px;
  }
  .lifecycle-svg-wrap { overflow-x: auto; }
  .stage-desc-box {
    margin-top: 12px; padding: 11px 15px; background: #f8fafc;
    border-radius: 8px; font-size: 13px;
  }

  .factors-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 12px;
  }
  .factor-card {
    background: var(--card-bg); border-radius: 10px; padding: 15px;
    box-shadow: var(--shadow); border-top: 3px solid; transition: box-shadow 0.2s;
  }
  .factor-card:hover { box-shadow: var(--shadow-hover); }
  .factor-header { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
  .factor-icon { font-size: 20px; }
  .factor-name { font-size: 12px; font-weight: 700; color: #374151; }
  .factor-en { font-size: 10px; color: #9ca3af; margin-top: 1px; }
  .factor-text { font-size: 12.5px; line-height: 1.75; color: var(--text); white-space: pre-line; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-thumb { background: #c0cdd8; border-radius: 3px; }
  .highlight { background: #fef08a; border-radius: 2px; }
</style>
</head>
<body>
<header>
  <div class="logo">⚙️</div>
  <div>
    <h1>零件生命週期影響因素查詢系統</h1>
    <div class="subtitle">Component Lifecycle Influence Factors Reference</div>
  </div>
  <div class="stats" id="headerStats"></div>
</header>

<main>
  <div class="left-panel">
    <div class="search-area">
      <div class="search-box">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8899aa" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="模糊查詢零件類別…" oninput="onSearch()" autocomplete="off">
        <button class="clear-btn" id="clearBtn" onclick="clearSearch()">&#10005;</button>
      </div>
    </div>
    <div class="filter-tabs">
      <button class="filter-tab all active" onclick="setFilter('全部')">全部</button>
      <button class="filter-tab active-comp" onclick="setFilter('主動元件')">主動</button>
      <button class="filter-tab passive-comp" onclick="setFilter('被動元件')">被動</button>
      <button class="filter-tab other-comp" onclick="setFilter('其他')">其他</button>
    </div>
    <div class="result-count" id="resultCount"></div>
    <div class="result-list" id="resultList"></div>
  </div>

  <div class="right-panel" id="rightPanel">
    <div class="placeholder">
      <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
      </svg>
      <p>請從左側搜尋並選擇零件類別</p>
    </div>
  </div>
</main>

<script>
const DATA = [{"id": 0, "category": "THICK FILM CHIP RESISTOR|THICK FILM CHIP RESISTOR\n(厚膜晶片電阻)", "displayName": "THICK FILM CHIP RESISTOR (厚膜晶片電阻)", "searchText": "THICK FILM CHIP RESISTOR THICK FILM CHIP RESISTOR (厚膜晶片電阻)", "type": "被動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "極成熟。演進在於小型化、提升功率密度與特殊應用。核心技術穩定，生命週期極長。", "市場需求": "極高。所有電子產品的基礎元件，需求與全球電子業景氣高度相關。", "供應鏈與製造能力": "非常成熟，供應商眾多，產能巨大。但因利潤低，易受市場供需影響，導致週期性的缺貨與價格波動。", "競爭者的產品": "競爭極度激烈，主要為價格與交期。差異化在於特殊規格品。", "產品可靠性與設計壽命": "可靠性高且可預測。AEC-Q200 是車用市場的基本門檻。壽命通常遠超終端產品。", "政府政策與環境規範": "RoHS/REACH 為基本要求。無鹵 (Halogen-Free) 規範日益重要。", "歷史數據": "歷史數據顯示生命週期非常長，一般通用規格品生命週期可達 20 年以上。需注意舊的大尺寸規格會逐漸被淘汰。"}}, {"id": 1, "category": "THICK FILM CHIP RESISTOR|ANTI-SURGE THICK FILM CHIP RESISTOR\n(抗浪湧厚膜晶片電阻)", "displayName": "ANTI-SURGE THICK FILM CHIP RESISTOR (抗浪湧厚膜晶片電阻)", "searchText": "THICK FILM CHIP RESISTOR ANTI-SURGE THICK FILM CHIP RESISTOR (抗浪湧厚膜晶片電阻)", "type": "被動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "成熟。是厚膜電阻的特規品。技術在於調整電阻膏配方與圖案，以承受高壓脈衝。生命週期極長。", "市場需求": "穩定成長。廣泛用於電源輸入端、通訊接口、工業設備的保護電路中。", "供應鏈與製造能力": "各大晶片電阻廠均有提供此系列產品，供應穩定。", "競爭者的產品": "主要競爭在於脈衝承受能力與尺寸的平衡。通常與 TVS, Varistor 等保護元件搭配使用。", "產品可靠性與設計壽命": "抗脈衝能力是其核心可靠性指標，性能通常依據 IEC 61000-4-5 等國際標準進行定義。", "政府政策與環境規範": "RoHS/REACH。", "歷史數據": "是厚膜電阻技術的一個成功延伸，生命週期與通用厚膜電阻一樣長，通常可達 20 年以上。"}}, {"id": 2, "category": "METAL RESISTOR\n|METAL FILM RESISTOR\n(金屬膜電阻)", "displayName": "METAL FILM RESISTOR (金屬膜電阻)", "searchText": "METAL RESISTOR  METAL FILM RESISTOR (金屬膜電阻)", "type": "被動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "極成熟。技術重點在於高精度 (Tolerance) 與低溫飄 (TCR)。技術演進緩慢，生命週期極長。", "市場需求": "穩定。主要應用於量測儀器、醫療設備、高階音響等需要精密訊號處理的領域。", "供應鏈與製造能力": "供應鏈穩定，主要由專業製造商主導。較少出現大規模缺貨。", "競爭者的產品": "競爭主要集中在性能指標 (精度、穩定性)，而非單純的價格。", "產品可靠性與設計壽命": "高可靠性與長期穩定性是其核心價值，設計壽命非常長。", "政府政策與環境規範": "RoHS/REACH 為基本要求。", "歷史數據": "許多經典型號已在市場上存在數十年，是生命週期最穩定的零件之一，生命週期通常可達 20 年以上。"}}, {"id": 3, "category": "CURRENT SENSING RESISTOR\n\n(電流感測電阻)", "displayName": "CURRENT SENSING RESISTOR (電流感測電阻)", "searchText": "CURRENT SENSING RESISTOR  (電流感測電阻)", "type": "被動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "成熟但持續演進。技術核心在於低阻值 (mΩ)、高精度、低TCR的金屬材料技術。", "市場需求": "需求強勁成長。由電動車、BMS、伺服器電源、馬達控制等高效電源管理應用驅動。", "供應鏈與製造能力": "專業性高。供應商需掌握特殊合金材料與精密製程。供應鏈相對集中於 Vishay, Rohm, Yageo 等大廠。", "競爭者的產品": "競爭在於性能 (TCR、精度) 和成本效益。在某些應用中會與霍爾效應感測器競爭。", "產品可靠性與設計壽命": "可靠性要求極高，其精度直接影響系統的效能與安全。AEC-Q200 是車用市場的標配。", "政府政策與環境規範": "RoHS/REACH。車規標準是重要的品質門檻。", "歷史數據": "歷史顯示其重要性隨電源管理精細化而提升，一個成功系列的生命週期可達 15 年以上。"}}, {"id": 4, "category": "THERMISTOR\n(熱敏電阻)", "displayName": "THERMISTOR (熱敏電阻)", "searchText": "THERMISTOR (熱敏電阻)", "type": "被動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "成熟但持續演進。演進在於材料科學，以提升精度、反應速度、穩定性。生命週期長且穩定。", "市場需求": "需求持續成長。廣泛應用於溫度偵測與保護，主要驅動力來自電池管理、電動車、IoT 裝置。", "供應鏈與製造能力": "專業性較高，供應商相對集中。核心技術在於材料配方與製程控制。", "競爭者的產品": "競爭在於 R-T 曲線的精確度與一致性。部分高精度應用會與 IC 溫度感測器競爭。", "產品可靠性與設計壽命": "可靠性是安全相關應用的關鍵。老化導致的阻值漂移是重要評估指標。", "政府政策與環境規範": "RoHS/REACH。醫療或汽車應用有額外的認證要求。", "歷史數據": "歷史數據可用於評估長期穩定性。因應用廣泛，標準型號生命週期通常可達 10-15 年以上。市場前景良好。"}}, {"id": 5, "category": "THERMISTOR\n|MULTILAYER THERMISTOR\n(積層式熱敏電阻)", "displayName": "MULTILAYER THERMISTOR (積層式熱敏電阻)", "searchText": "THERMISTOR  MULTILAYER THERMISTOR (積層式熱敏電阻)", "type": "被動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "成熟。將傳統熱敏電阻材料用類似 MLCC 的積層製程做成晶片型，實現小型化。", "市場需求": "需求高且成長。晶片型態使其非常適合用於空間有限的高密度電路板，如手機、穿戴裝置等。", "供應鏈與製造能力": "主流被動元件大廠 (TDK, Murata, Vishay) 均大量生產，供應穩定。", "競爭者的產品": "主要競爭來自傳統引腳型熱敏電阻 (成本較低但體積大) 與IC溫度感測器 (精度高但成本高)。", "產品可靠性與設計壽命": "可靠性良好，但需注意長期使用的老化漂移 (Aging Drift) 現象。", "政府政策與環境規範": "RoHS/REACH。", "歷史數據": "是元件 SMT 化的成功案例，生命週期與電子產品小型化趨勢同步，典型生命週期可達 10-15 年以上。"}}, {"id": 6, "category": "WIREWOUND RESISTOR\n(繞線電阻)", "displayName": "WIREWOUND RESISTOR (繞線電阻)", "searchText": "WIREWOUND RESISTOR (繞線電阻)", "type": "被動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "極成熟。技術優勢在於可同時實現高功率、高精度。生命週期極長。", "市場需求": "利基型穩定需求。應用於精密儀器 (分流器)、電源負載、測試設備等。", "供應鏈與製造能力": "專業製造，供應鏈穩定。因應用特殊，不易被其他類型取代。", "競爭者的產品": "競爭主要在於客製化 ANSFORMER ", "type": "被動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "極成熟。技術演進與 Ethernet 標準同步，如傳輸速度 (1G/10G) 和 PoE 功率等級。", "市場需求": "需求穩定。與網路通訊設備 (交換器、路由器、網卡) 市場同步成長。", "供應鏈與製造能力": "供應鏈成熟，但繞線製程仍需大量人工。供應商專業分工明確。", "競爭者的產品": "在乙太網路隔離應用中，沒有直接的技術替代品。", "產品可靠性與設計壽命": "可靠性非常高，設計壽命通常與終端設備相同。", "政府政策與環境規範": "必須符合 IEEE 802.3 相關標準與 UL/IEC 安全隔離規範。", "歷史數據": "歷史顯示，產品生命週期與其對應的網路標準掛鉤，一個主流標準的產品生命週期可達 10-15 年。"}}, {"id": 11, "category": "TRANSFORMER|POWER TRANSFORMER", "displayName": "POWER TRANSFORMER", "searchText": "TRANSFORMER POWER TRANSFORMER", "type": "被動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "極成熟。演進在於效率提升、功率密度增加與新材料應用。生命週期極長。", "市場需求": "需求廣泛而穩定。從小型消費電子到大型工業電力系統都需要。需求受節能趨勢驅動。", "供應鏈與製造能力": "供應鏈非常多元，從標準品大廠到客製化小廠都有。核心原料為銅與磁芯材料。", "競爭者的產品": "競爭在於效率、尺寸、溫升與成本。高頻化趨勢使其往平面變壓器發展。", "產品可靠性與設計壽命": "可靠性極高，設計壽命通常以十年為單位計算。失效模式多為絕緣層在高溫下老化。", "政府政策與環境規範": "能源效率規範是驅動力。UL/IEC 等安規認證是必須的。", "歷史數據": "歷史悠久的元件，生命週期極長，標準品生命週期可達 20 年以上。產品的更迭主要來自安規和能效標準的升級。"}}, {"id": 12, "category": "POWER_IC|Buck/Boost/Buck-Boost:Converter/Controller/module", "displayName": "Buck/Boost/Buck-Boost:Converter/Controller/module", "searchText": "POWER_IC BUCK/BOOST/BUCK-BOOST:CONVERTER/CONTROLLER/MODULE", "type": "主動元件", "lifecycle": "Growth", "factors": {"技術成熟度與演進速度": "• 拓撲技術持續演進（同步整流、谷值控制、寬輸入範圍）\n• 封裝由 QFN→CSP/模組化，功率密度提升• 高頻 GaN/SiC 應用逐步導入\n• 模組化方案快速迭代", "市場需求": "• AI/Server/車用需求高漲\n• IoT/穿戴推動低功耗小尺寸\n• EV/快充帶動高壓需求\n• 市場需求擴張但價格敏感", "供應鏈與製造能力": "• 國際大廠供應集中（TI/ADI/MPS）\n• 模組 BOM 成本高，供應鏈較複雜\n• 高功率器件封裝良率為瓶頸\n• 中低階 IC 二來源容易，高階難", "競爭者的產品": "• Pin-to-Pin 替代有限，多需重做 layout\n• 功率密度、熱設計為差異化關鍵\n• 控制迴路與特性不同，跨品牌需再驗證", "產品可靠性與設計壽命": "• 常見失效：MOS 熱失控、磁性件飽和\n• 車用需 AEC-Q100；可靠度驗證嚴格\n• 降額與散熱設計對壽命關鍵", "政府政策與環境規範": "• 能效法規（80 PLUS、Energy Star）\n• RoHS/REACH，車規 ISO 26262\n• 車用/工控安規要求嚴格", "歷史數據": "• 典型壽命 7–12 年\n• 模組化週期更短，快速迭代\n• 控制器隨平台升級 EOL"}}, {"id": 13, "category": "POWER_IC|LDO/Linear Regulator", "displayName": "LDO/Linear Regulator", "searchText": "POWER_IC LDO/LINEAR REGULATOR", "type": "主動元件", "lifecycle": ERTER  (AC-DC / DC-DC，含 FULL/HALF/QUARTER/EIGHTH/SIXTEENTH BRICK)", "type": "其他", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "• AC-DC 技術成熟，效率逐步提升至 95%+\n• DC-DC 技術演進快，支援高功率密度（GaN/SiC、ZVS、ZCS 拓撲）\n• 封裝標準化（Full/Half/Quarter/Eighth/1/16 Brick）已成業界共識", "市場需求": "• 資料中心、5G、電信、工控、伺服器為主要驅動力\n• 高效率/高功率密度需求不斷上升\n• Full/Half Brick 傳統市場需求逐漸下降，Quarter/Eighth/1/16 Brick 持續成長", "供應鏈與製造能力": "• 關鍵瓶頸在磁性元件、功率半導體與高頻封裝\n• 全球產能主要集中於少數大廠（Vicor、Delta、Artesyn、Murata）\n• 高功率密度設計需要精密散熱與測試能力", "競爭者的產品": "• 各家競爭差異化在於 效率、尺寸、熱設計\n• 大廠掌握高端市場，中小廠多提供性價比方案\n• POL IC 在低功率領域逐漸侵蝕 Brick 需求", "產品可靠性與設計壽命": "• 設計壽命一般 >10 年\n• 可靠性依賴 散熱、功率循環、焊點與磁件壽命\n• 車規/伺服器規格需通過嚴苛測試（如 HALT/HASS、AEC-Q）", "政府政策與環境規範": "• RoHS/REACH、安規（UL/IEC/EN）、資料中心能效法規（80PLUS/Titanium）\n• 車用/通訊需符合法規與安規認證", "歷史數據": "• Full/Half Brick 已有 20+ 年應用，逐步進入成熟/衰退期\n• Quarter/Eighth Brick 在近 10–15 年快速成長，仍屬成長期\n• 1/16 Brick 與超高功率密度模組仍在探索期，演進速度快"}}, {"id": 24, "category": "TRANSISTOR|MOSFET", "displayName": "MOSFET", "searchText": "TRANSISTOR MOSFET", "type": "主動元件", "lifecycle": "Growth", "factors": {"技術成熟度與演進速度": "核心驅動力：技術快速迭代，導致產品生命週期相對較短\n• 製程演進 (Process Evolution): Trench → Super Junction → SiC/GaN。\n- 溝槽式 (Trench) vs. 超接合 (Super Junction): 高壓MOSFET從傳統平面式演進到Trench結構，再到Super Junction技術，每一代都大幅降低導通電阻(Rds(on))，舊技術產品迅速失去競爭力。\n- 新材料導入： 碳化矽(SiC)和氮化鎵(GaN)等寬能隙半導體，在高壓、高頻、高效率應用中（如電動車逆變器、伺服器電源）直接取代傳統矽(Si)MOSFET，導致後者在高端市場的生命週期終結。\n• 封裝演進 (Package Evolution): TO-220 → DPAK → QFN/DFN → WLCSP/DrMOS\n- 從插件到貼片： 傳統的TO-220、TO-247插件封裝，逐漸被DPAK、D2PAK等貼片封裝取代以適應自動化生產。\n- 從引腳到無引腳/散熱優化： QFN、DFN、PowerPAK®等無引腳封裝因其體積小、散熱佳、寄生電感低而成為主流。銅夾片(Copper Clip)等內部連接技術取代傳統焊線(Wire Bond)，進一步提升了電流能力和可靠性。\n- 先進封裝： 晶圓級晶片尺寸封裝(WLCSP)或整合驅動IC的DrMOS/Power Stage模組，將分立MOSFET的功能整合，縮短了單一MOSFET元件的市場需求。", "市場需求": "決定產品方向與生命長度的關鍵\n• 新興應用驅動：\n- 電動車(EV)： 牽引逆變器、車載充電器(OBC)需要高壓、大電流、高可靠性的MOSFET (特別是SiC MOSFET)，這類產品的生命週期會非常長。\n- AI伺服器/資料中心： 48V電源架構需要高效的低壓大電流MOSFET，其需求隨AI算力增長而爆發，確保了相關產品的長期供應。\n- 快充(USB PD)： 對高頻、小型化MOSFET (特別是GaN HEMT)的需求，加速了這類新技術產品的量產與普及。\n• 成熟應用衰退： 傳統PC主機板、CCFL背光顯示器等市場萎縮，相關應用的專用MOSFET型號會很快進入停產(EOL)階段。", "供應鏈與製造能力": "決定供貨穩定性與成本結構\n• 晶圓代工廠策略：\n - 8吋廠 vs. 12吋廠： 大多數MOSFET在8吋晶圓廠生產。但隨著8吋廠產能緊張且設備老舊，供應商會將新產品轉移至更具成本效益的12吋廠，這可能導致舊的8吋廠產品線被提前終止。\n- IDM廠 vs. Fabless廠： 英飛凌(Infineon)、安森美(ON Semi)等IDM大廠自行控制產能，策略較穩定。而無廠半導體公司(Fabless)則依賴代工廠，更容易受產能排擠影響。\n• 原材料供應： 矽晶圓、銅引腳框(Lead Frame)、環氧樹脂(Epoxy)等價格波動和供應短缺會直接影響生產，尤其在供應緊張時，廠商會優先保障高毛利新產品的生產。", "競爭者的產品": "加速產品更新換代的外在壓力\n• 性能指標(FOM)競賽： 競爭者推出品質因數(Figure of Merit, FOM = Rds(on) * Qg)更低的產品，意味著在相同導通電阻下開關損耗更小。一旦有性能更優的競品出現，現有產品的市場吸引力就會下降。\n• 價格侵蝕： 尤其在消費性電子等通用市場，中國大陸廠商的崛起帶來激烈的價格競爭，迫使原廠加速推出性價比更高的新品，並淘汰利潤微薄的舊型號。", "產品可靠性與設計壽命": "決定特定市場的供貨承諾\n• 車規認證 (AEC-Q101): 一旦產品通過AEC-Q101認證，供應商通常會承諾10-15年的長期供貨，以滿足汽車產業的生命週期需求。這類產品的生命週期遠比消費級產品長且穩定。\n• 工業/軍用級： 同樣要求高可靠性和長期供應保證，生命週期長。其設計餘量(Design Margin)更大，不易被輕微性能提升的新品取代。\n• 消費級產品： 可靠性滿足基本要求即可，生命週期短，通常2-3年就會有替代新品。", "政府政策與環境規範": "具備強制性淘汰的效力\n• 環保指令：\n- RoHS (危害性物質限制指令): 限制鉛、汞等物質的使用。從有鉛製程轉向無鉛製程，直接淘汰了所有舊產品。\n- REACH (化學品註冊、評估、授權和限制): 規範化學物質的使用，若封裝材料或製程中使用的化學品被列入高度關注物質(SVHC)清單，可能導致產品需要重新設計或停產。\n- 無鹵素(Halogen-Free)： 越來越多客戶要求封裝材料無鹵素，不符合的產品將失去市場。\n•中美貿易戰可能影響進出口與關稅", "歷史數據": "預測未來趨勢的重要參考\n• 產品家族演進週期： 分析某個供應商（例如英飛凌的CoolMOS™系列）從C3、C6、C7到P7、S7各代產品的發布間隔與生命週期，可以預測下一代產品的出現時間點以及現有產品的可能壽命。\n• 停產通知(EOL Notice)分析： 追蹤市場上同類產品的EOL通知，可以發現某些技術（如特定電壓等級的平面MOSFET）或封裝（如SOT-223）是否正在被系統性地淘汰。"}}, {"id": 25, "category": "INDUCTOR|INDUCTOR", "displayName": "INDUCTOR", "searchText": "INDUCTOR INDUCTOR", "type": "被動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "核心特性：技術演進緩慢，生命週期極長\n• 磁芯材料演進 (Core Material Evolution):\n- 鐵氧體 (Ferrite) vs. 金屬磁粉芯 (Metal Powder): 傳統鐵氧體磁芯在高頻下損耗低，但飽和電流較低。新型金屬複合材料（如鐵矽鋁、坡莫合金）則提供更高的飽和電流和更軟的飽和特性，適用於大電流應用，但這種演進是漸進的，兩種材料長期並存。\n• 結構工藝演進 (Construction Evolution): \n- 繞線式 vs. 一體成型 (Molded): 傳統繞線電感工藝成熟，但有嘯叫風險且體積較大。一體成型(Molded Choke)將線圈與磁粉壓鑄成型，結構堅固、無嘯叫、EMI屏蔽性好，成為當前主流，但並未完全淘汰繞線式。\n- 圓線 vs. 扁平線 (Flat Wire): 扁平線圈利用趨膚效應(Skin Effect)可降低交流電阻(ACR)，並提高繞線空間利用率，適用於高頻、大電流應用，是對傳統圓線工藝的升級。", "市場需求": "驅動規格優化，而非技術革命\n• 小型化與高功率密度： 智慧型手機、穿戴裝置等要求電感尺寸不斷縮小（如從2520 -> 2016 -> 1608尺寸），但這是在現有技術基礎上的尺寸微縮，原有技術的產品依然在其他領域使用。\n• 高頻化需求： GaN/SiC等開關元件工作頻率提升至MHz級別，要求電感在高頻下仍能保持低磁芯損耗和低交流電阻(ACR)，催生了針對高頻優化的新材料電感。\n• 大電流需求： 伺服器CPU/GPU的VRM動輒需要上百安培電流，這要求電感具備極低的直流電阻(DCR)和極高的飽和電流(Isat)，推動了扁平線和大體積、低損耗磁材的應用。", "供應鏈與製造能力": "成本與交期的主要影響因素\n• 原材料依賴性：\n- 銅價： 銅是線圈的主要材料，其價格波動直接影響電感成本。\n- 磁粉供應： 高性能金屬磁粉的核心技術掌握在少數幾家廠商手中（如Micrometals, Changsung），其供應穩定性對高端電感至關重要。\n• 製造工藝： 繞線、焊接等工序部分仍依賴人工，自動化程度不如半導體。產能擴充速度較慢，在需求高峰期容易出現交期延長。", "競爭者的產品": "漸進式的性能/成本競爭\n• 性能規格競賽： 競爭的核心是“在相同的封裝尺寸下，誰能提供更低的DCR和更高的Isat/Irms”。例如，TDK和Würth的同尺寸電感，其競爭就在於規格書上幾個mΩ或幾安培的細微差異。\n• 成本優化： 在規格相近時，通過改善製造工藝、更換成本較低的磁芯材料來獲得價格優勢，是市場競爭的另一主要手段。這種競爭不會輕易導致某個產品被淘汰。", "產品可靠性與設計壽命": "物理壽命極長，市場壽命由應用決定\n• 車規認證 (AEC-Q200): 汽車應用要求電感能耐受高溫、高濕度和劇烈振動。通過AEC-Q200認證的電感同樣有長達10-15年的供貨保證。\n• 物理堅固性： 電感是物理元件，無半導體PN結等結構，不易老化或失效。其失效模式通常是過熱導致絕緣漆融化短路，或物理應力導致磁芯破裂，在正常使用下壽命極長。\n• 市場壽命： 一個標準尺寸（如1210）的電感，只要還有應用在使用這個尺寸，它就可能一直生產下去，生命週期可超過20年。", "政府政策與環境規範": "基礎門檻，影響材料選擇\n• 環保指令 (RoHS/REACH): 同樣是市場准入的基礎。主要影響電感外部的塗層材料、引腳的焊接材料（無鉛錫）以及磁芯材料中可能含有的受限物質。\n• 衝突礦產 (Conflict Minerals): 電感的焊錫中可能含有錫(Tin)，需確保其來源符合無衝突礦產的要求。\n• 關稅/產地來源限制影響供應", "歷史數據": "預測性極強的穩定指標\n• 標準化尺寸的延續性： 分析EIA標準封裝尺寸（如0402, 0603, 0805）的歷史，會發現這些尺寸生命週期非常長。變的是內部性能，不變的是外形，因此歷史數據非常可靠。\n• 極低的退市率： 除非某個行業整體性的技術升級（例如，筆記型電腦主機板供電從DIP電感全面轉向SMD電感），否則通用型功率電感的停產非常罕見。"}}, {"id": 26, "category": "SWITCH|DETECTOR SWITCH", "displayName": "DETECTOR SWITCH", "searchText": "SWITCH DETECTOR SWITCH", "type": "其他", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "• 成熟機構式檢知，微小化/低作動力/防塵結構持續優化\n• 創新幅度小，材料與端子設計漸進式迭代", "市場需求": "• 工業自動化、印表/家電門位偵測穩定需求\n• 部分應用被磁簧/霍爾或光電感測取代", "供應鏈與製造能力": "• 金屬彈片/銀合金觸點/塑膠件為關鍵；模具依客製開發\n• 產能多集中東亞；地緣/模具維護影響交期", "競爭者的產品": "• 品牌與白牌並存，價格競爭激烈；外形/動作力差異化\n• 感測器方案形成跨品類替代競爭", "產品可靠性與設計壽命": "• 機械壽命10^5~10^7次；接觸電阻與彈跳控制關鍵\n• 防塵防水(IP)與溫濕度、化學品耐受", "政府政策與環境規範": "• RoHS/REACH、PFAS/溴系管制趨勢；UL/EN機械安全\n• 可回收材質與無鹵要求增加", "歷史數據": "• 族群型號壽命長(>10年)，常因模具/需求下滑停產\n• 可替代型號多，但需注意安裝尺寸/作動力差異"}}, {"id": 27, "category": "SWITCH|DOOR SWITCH", "displayName": "DOOR SWITCH", "searchText": "SWITCH DOOR SWITCH", "type": "其他", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "• 成熟門鎖/互 規範": "標準由JEDEC制定（DDR4/DDR5/DDR6規範）；需符合RoHS規範", "歷史數據": "DDR3→DDR4→DDR5演進趨勢明顯；KCC整合計畫2023年Phase III後預計2026~2027重啟；預計DDR6於2031-2035導入；EOL Date維護為主要管理對策"}}, {"id": 126, "category": "LOGIC|LOGIC(AND/OR/NOR/NOT/BUFFER/SWITCH...)", "displayName": "LOGIC", "searchText": "LOGIC LOGIC(AND/OR/NOR/NOT/BUFFER/SWITCH...)", "type": "主動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "極低演進速度。技術非常成熟，新技術替代性低。主要考慮是否仍有特定電壓或速度標準的需求。", "市場需求": "普遍需求，多應用於基礎電路。市場規模穩定，但成長緩慢。主要受舊產品維護或成本敏感的應用驅動。", "供應鏈與製造能力": "許多製造商提供，供應穩定性高。製程技術成熟，產能充裕。應注意特定舊封裝的停產風險。", "競爭者的產品": "競爭激烈，價格戰是主要考量。新競爭者難以突破，但低成本替代品可能影響份額。", "產品可靠性與設計壽命": "壽命極長，設計壽命主要受封裝與製程影響。工業/汽車級應用要求更長供貨期。", "政府政策與環境規範": "需符合RoHS/REACH等基本環保標準。較少受特定通訊或安全規範影響。", "歷史數據": "產品生命週期長（10-20年以上）。停產/退市率極低，通常是因為舊製程淘汰。"}}, {"id": 127, "category": "LOGIC|BUS TRANSCEIVER/BUS SWITCH", "displayName": "BUS TRANSCEIVER/BUS SWITCH", "searchText": "LOGIC BUS TRANSCEIVER/BUS SWITCH", "type": "主動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "演進速度中等。主要受新介面標準（如PCIe, USB, MIPI）及低功耗趨勢影響。電壓轉換器受新處理器/記憶體電壓標準影響大。", "市場需求": "需求與數位系統設計的複雜度成正比。伺服器、通訊、消費電子為主要市場。高速與低延遲是關鍵需求。", "供應鏈與製造能力": "供應商數量適中。高速介面零件可能製程要求較高。需關注特定高速介面供應商的產能。", "競爭者的產品": "新介面標準推出時，領先者會獲得市場份額。通用型零件競爭仍以成本與速度規格為主。", "產品可靠性與設計壽命": "設計壽命中長。高速元件的信號完整性與ESD保護是可靠性關鍵。汽車級需求量大且週期長。", "政府政策與環境規範": "受電磁相容性 (EMC) 規範影響較大，特別是高速通訊設備。特定產業標準（如汽車、工業）需遵守。", "歷史數據": "平均生命週期較長（7-15年），但受標準更新影響，舊標準零件退市風險較高。"}}, {"id": 128, "category": "SENSOR|ACCELEROMETER(G SENSOR)/GYRO METER/E-COMPASS SENSOR", "displayName": "ACCELEROMETER/GYRO METER/E-COMPASS SENSOR", "searchText": "SENSOR ACCELEROMETER(G SENSOR)/GYRO METER/E-COMPASS SENSOR", "type": "主動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "MEMS微型化與整合度： 技術演進快，不斷朝向尺寸更小、功耗更低、多軸整合、精度更高發展。新一代演算法與感測器融合技術可能加速舊款淘汰。", "市場需求": "消費性電子（手機、平板、穿戴式）需求量大但生命週期短。汽車（ADAS、導航）、無人機、工業應用需求穩定但對可靠性要求高，生命週期較長。", "供應鏈與製造能力": "MEMS製程複雜： 依賴特定晶圓廠與封裝技術。供應商集中度高，任何一家大廠的產能或製程轉變，影響會很大。", "競爭者的產品": "價格戰激烈： 消費性市場競爭者多，價格與規格（如尺寸/功耗）是關鍵，很容易因競爭者推出更具性價比或更高整合度的產品而被迫退市。", "產品可靠性與設計壽命": "機械結構壽命： MEMS產品需考慮長期震動、衝擊下的機械結構可靠性。車規/工規產品的MTBF（平均故障間隔時間）與使用年限要求極高。", "政府政策與環境規範": "進出口管制： 高精度或軍民兩用的陀螺儀/慣性導航產品，可能受到出口管制或貿易戰影響。", "歷史數據": "平均生命週期： 消費級產品約1.5~3年就面臨大規格更新。工規/車規產品生命週期可達5~10年甚至更久。"}}, {"id": 129, "category": "SENSOR|TEMPERATURE SENSOR/HUMIDITY", "displayName": "TEMPERATURE SENSOR/HUMIDITY", "searchText": "SENSOR TEMPERATURE SENSOR/HUMIDITY", "type": "主動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "技術成熟，但不斷優化。 演進方向為更高的絕對精度、長期穩定性、更廣的測量範圍、數位化輸出、高溫/高濕環境耐受。舊型類比輸出產品逐漸被數位I$^2$C/SPI取代。", "市場需求": "市場通用且分散。 應用於家電、HVAC、醫療、汽車、工業控制等，需求相對穩定。受智慧建築、冷鏈物流、醫療保健等新興 IoT 應用驅動。", "供應鏈與製造能力": "製程相對標準，多來源選擇多。 溫濕度感測器供應商數量較多，多源備援較容易。但醫療級或特殊校準產品仍依賴特定供應商。", "競爭者的產品": "成本與穩定性競爭。 競爭點在於BOM成本、長期精度漂移、功耗。競爭者眾多，價格競爭激烈。", "產品可靠性與設計壽命": "環境適應性至關重要。 需關注長期高濕、化學污染物對感測器核心或封裝材料的腐蝕與影響。校準週期與長期漂移決定其實際可用壽命。", "政府政策與環境規範": "醫療/食品級規範。 涉及HVAC、醫療、食品儲存的應用需符合嚴格的衛生、安全與精度法規。", "歷史數據": "週期中等偏長：約 3 ~ 7 年。 舊型號通常因新一代產品成本更低、功耗更低或整合數位輸出而被取代，但基本功能變化不大。"}}, {"id": 130, "category": "DYNAMIC RANDOM ACCESS MEMORY", "displayName": "DYNAMIC RANDOM ACCESS MEMORY", "searchText": "DYNAMIC RANDOM ACCESS MEMORY", "type": "主動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "世代更迭快速（DDR4 -> DDR5）。新技術標準對舊世代的取代速度是生命週期主因。", "市場需求": "受 PC/Server/Data Center 需求集中驅動，需求量大且波動劇烈。", "供應鏈與製造能力": "製程技術領導廠商集中，先進製程轉換率影響供貨。", "競爭者的產品": "新世代DDR的性價比競爭，或與CXL/HBM等記憶體互連技術的發展。", "產品可靠性與設計壽命": "標準化產品，主要考量 JEDEC 規範及溫度/時脈壽命。", "政府政策與環境規範": "關稅影響終端組裝成本。環保要求（如無鹵素、無鉛）。", "歷史數據": "主流世代（如DDR4）的主要生命週期約 5-8 年。舊世代（如DDR3）轉為利基市場後可持續供貨 10 年以上。"}}, {"id": 131, "category": "FLASH|EMBEDDED MULTIMEDIA CARD", "displayName": "EMBEDDED MULTIMEDIA CARD", "searchText": "FLASH EMBEDDED MULTIMEDIA CARD", "type": "主動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "技術相對穩定，但受UFS新標準的取代壓力。", "市場需求": "主要用於中低階手機、平板、車載、消費電子等。單價敏感。", "供應鏈與製造能力": "主要供應商產能集中，NAND Flash晶圓供應是核心瓶頸。", "競爭者的產品": "受UFS (更高速度) 在中高階市場的取代，以及SSD (更高容量) 的競爭。", "產品可靠性與設計壽命": "考量P/E Cycle (寫入/抹除次數) 壽命，以及資料保留能力。", "政府政策與環境規範": "車規/工規認證要求更高的可靠性與環境適應性。", "歷史數據": "平均容量的成長速度，以及技術世代的生命週期。"}}, {"id": 132, "category": "FLASH|NOT-AND FLASH MEMORY", "displayName": "NOT-AND FLASH MEMORY", "searchText": "FLASH NOT-AND FLASH MEMORY", "type": "主動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "製程微縮 (3D NAND層數) 演進速度極快。QLC/PLC等新技術影響壽命。", "市場需求": "應用極廣（SSD、手機、資料中心）。資料儲存量爆炸式成長是主要推力。", "供應鏈與製造能力": "晶圓製造 (Fab) 投資巨大，單一晶圓廠事件影響大。供應商集中度高。", "競爭者的產品": "QLC/TLC等不同技術間的成本/效能競爭。", "產品可靠性與設計壽命": "P/E Cycle 隨製程微縮而下降，需仰賴韌體 (Firmware) 管理可靠性。", "政府政策與環境規範": "受到國際貿易與關稅影響產品價格。部分國家對資料中心有在地化要求。", "歷史數據": "位元密度/技術 (如SLC/MLC) 的生命週期約 3-5 年，不斷被更高密度取代。"}}, {"id": 133, "category": "FLASH|NOT-OR FLASH MEMORY", "displayName": "NOT-OR FLASH MEMORY", "searchText": "FLASH NOT-OR FLASH MEMORY", "type": "主動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "技術成熟，演進速度慢。逐漸轉向特殊應用或低功耗領域。", "市場需求": "主要用於Code Storage (儲存程式碼)，如IoT、車載、網路設備的快速啟動需求。", "供應鏈與製造能力": "舊製程維持供應，但產能較小，容易受市場波動影響。", "競爭者的產品": "需與SRAM或eMMC在特定應用中競爭，主要考量讀取速度與成本。", "產品可靠性與設計壽命": "長期資料保留能力強，主要考量在低功耗與高可靠性。", "政府政策與環境規範": "車規/工規認證，因應用於系統核心程式碼。", "歷史數據": "舊型號的長期供貨穩定性，以及客製化型號的退市趨勢。"}}, {"id": 134, "category": "FLASH|SOLID STATE DRIVE", "displayName": "SOLID STATE DRIVE", "searchText": "FLASH SOLID STATE DRIVE", "type": "主動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "主控晶片效能與介面標準 (PCIe Gen4/Gen5) 演進快。", "市場需求": "受 Data Center、PC、企業級儲存需求驅動，成長迅速。", "供應鏈與製造能力": "NAND晶圓供應是瓶頸。主控IC供應商競爭激烈。", "競爭者的產品": "與HDD在容量與成本上的競爭。不同介面 (SATA/NVMe) 的取代競爭。", "產品可靠性與設計壽命": "考量 TBW (總寫入位元組) 壽命，以及散熱與韌體穩定性。", "政府政策與環境規範": "資料安全與加密標準要求。部分國家對儲存設備的在地化要求。", "歷史數據": "介面/世代產品生命週期較短，約 3-5 年，但技術持續迭代。"}}, {"id": 135, "category": "RAM|FRAM", "displayName": "FRAM", "searchText": "RAM FRAM", "type": "主動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "技術特殊且穩定，演進著重於容量提升或低功耗設計。", "市場需求": "極低功耗、高耐久性的特殊應用，如電錶、醫療、工業控制。", "供應鏈與製造能力": "供應商少，多為單一來源。產能規模小，容易因需求波動而供貨緊張。", "競爭者的產品": "與 EEPROM/SRAM 等在非揮發性和寫入耐久性上的競爭。", "產品可靠性與設計壽命": "極高寫入耐久度是主要優勢。考量資料保留時間與抗輻射能力。", "政府政策與環境規範": "特殊工業或航太級產品的長期供貨保證與嚴格認證。", "歷史數據": "生命週期極長，因應用於高可靠性利基市場，單一產品可供貨 10-15 年。"}}, {"id": 136, "category": "RAM|SRAM", "displayName": "SRAM", "searchText": "RAM SRAM", "type": "主動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "技術非常成熟，速度極快，但成本高昂。", "市場需求": "主要用於高速緩衝 (Cache)、暫存器、小型嵌入式系統等對速度要求極高的場合。", "供應鏈與製造能力": "多使用成熟製程。產能較不具備彈性。", "競爭者的產品": "內嵌式SRAM在SoC (系統單晶片) 內的整合，是主要取代力量。", "產品可靠性與設計壽命": "極高讀寫速度與低延遲是考量點。非揮發性SRAM需考量電池壽命。", "政府政策與環境規範": "應用於軍事、航太等領域需極高可靠性與認證。", "歷史數據": "生命週期長，分立式SRAM的平均生命週期約 8-12 年。"}}, {"id": 137, "category": "EEPROM/EPROM/FIFO", "displayName": "EEPROM/EPROM/FIFO", "searchText": "EEPROM/EPROM/FIFO", "type": "主動元件", "lifecycle": "Decline", "factors": {"技術成熟度與演進速度": "技術高度成熟，生命週期長。EPROM/FIFO逐漸被取代。", "市場需求": "主要用於參數儲存、配置資料、簡單資料緩衝等少量非揮發性或緩衝需求。", "供應鏈與製造能力": "EEPROM供應商眾多，但部分舊型號面臨停產風險。", "競爭者的產品": "受FRAM (高耐久度) 或NOR Flash (大容量) 在特定應用中的競爭。", "產品可靠性與設計壽命": "EEPROM考量寫入/抹除次數 (P/E Cycle) 壽命，一般耐久度低於FRAM。", "政府政策與環境規範": "汽車/工業應用對寬溫與高可靠性有要求。", "歷史數據": "舊型號的平均生命週期，以及技術過渡的歷史數據。"}}, {"id": 138, "category": "READ-ONLY MEMORY|ERASABLE PROGRAMMABLE READ-ONLY MEMORY", "displayName": "ERASABLE PROGRAMMABLE READ-ONLY MEMORY", "searchText": "READ-ONLY MEMORY ERASABLE PROGRAMMABLE READ-ONLY MEMORY", "type": "主動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "技術高度成熟，生命週期長。EPROM/FIFO 逐漸被淘汰。", "市場需求": "主要用於參數儲存、配置資料、簡單資料緩衝等少量非揮發性或緩衝需求。", "供應鏈與製造能力": "EEPROM 供應商眾多，但部分舊型號面臨停產風險。", "競爭者的產品": "受 FRAM (高耐久度) 或 NOR Flash (大容量) 在特定應用中的競爭。", "產品可靠性與設計壽命": "EEPROM 考量寫入/抹除次數 (P/E Cycle) 壽命，一般耐久度低於FRAM。", "政府政策與環境規範": "汽車/工業應用對寬溫與高可靠性有要求。", "歷史數據": "最長壽零件之一，許多產品在利基市場供貨期長達 15-20 年。"}}, {"id": 139, "category": "CONTROLLER IC|CARD READER/SMART CARD/SIM CARD", "displayName": "CARD READER/SMART CARD/SIM CARD", "searchText": "CONTROLLER IC CARD READER/SMART CARD/SIM CARD", "type": "主動元件", "lifecycle": "Maturity", "factors": {"技術成熟度與演進速度": "穩定但受協議驅動。 技術演進集中在支援新的標準協議（如新的USB版本、EMV規範）及增強安全加密功能。", "市場需求": "穩定。 主要受金融支付、身份識別、移動通訊市場驅動，但非接觸式（NFC）技術是潛在威脅。", "供應鏈與製造能力": "標準製程。 供應穩定性高，但需關注特定安全晶片的認證與封裝能力。", "競爭者的產品": "競爭對手是否推出支援更高安全等級或非接觸式功能的整合方案。", "產品可靠性與設計壽命": "壽命長。重點是加密演算法的安全性和物理插拔介面的耐用性。", "政府政 function getFiltered() {
  const q = currentQuery.toLowerCase().trim();
  return DATA.filter(d => {
    if (currentFilter !== '全部' && d.type !== currentFilter) return false;
    if (!q) return true;
    const s = (d.searchText + ' ' + d.displayName).toLowerCase();
    return q.split(/\s+/).every(w => s.includes(w));
  });
}

function hl(text, q) {
  if (!q.trim()) return text;
  let r = text;
  q.trim().split(/\s+/).forEach(w => {
    if (!w) return;
    r = r.replace(new RegExp('(' + w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi'), '<span class="highlight">$1</span>');
  });
  return r;
}

function renderList() {
  const filtered = getFiltered();
  document.getElementById('resultCount').textContent = '顯示 ' + filtered.length + ' 筆結果';
  const container = document.getElementById('resultList');
  if (!filtered.length) {
    container.innerHTML = '<div class="no-results">🔍 找不到符合的零件類別</div>';
    return;
  }
  container.innerHTML = filtered.map(d => {
    const sel = d.id === selectedId ? ' selected' : '';
    const tb = d.type === '主動元件' ? 'badge-active' : d.type === '被動元件' ? 'badge-passive' : 'badge-other';
    const lc = d.lifecycle;
    const col = LC_COLORS[lc] || '#999';
    return '<div class="result-item' + sel + '" onclick="selectItem(' + d.id + ')">' +
      '<div class="item-name">' + hl(d.displayName, currentQuery) + '</div>' +
      '<div class="item-meta">' +
        '<span class="badge ' + tb + '">' + d.type + '</span>' +
        '<span class="badge" style="background:' + col + '22;color:' + col + ';">' + (LC_ZH[lc]||lc) + '</span>' +
      '</div></div>';
  }).join('');
}

function setFilter(f) {
  currentFilter = f;

  const map = {'全部':'all','主動元件':'active-comp','被動元件':'passive-comp','其他':'other-comp'};
  document.querySelector('.filter-tab.' + map[f]).classList.add('active');

// ── Lifecycle SVG ──
function buildSVG(stage) {
  const W=680, H=185, pL=18, pR=18, pT=20, pB=52;
  const gW=W-pL-pR, gH=H-pT-pB, n=6, segW=gW/n;
  const yV=[0.22,0.72,1.0,0.60,0.28,0.05];
  const pts = LC_STAGES.map((s,i) => ({ x: pL+i*segW+segW/2, y: pT+gH*(1-yV[i]) }));
  const all = [{x:pL,y:pT+gH},...pts,{x:W-pR,y:pT+gH*0.98}];

  function cr(p0,p1,p2,p3) {
    const a=0.5;
    const t01=Math.pow(Math.hypot(p1.x-p0.x,p1.y-p0.y),a);
    const t12=Math.pow(Math.hypot(p2.x-p1.x,p2.y-p1.y),a);
    const t23=Math.pow(Math.hypot(p3.x-p2.x,p3.y-p2.y),a);
    const eps=1e-8;
    const m1x=(p2.x-p1.x)+t12*((p1.x-p0.x)/(t01+eps)-(p2.x-p0.x)/(t01+t12+eps));
    const m1y=(p2.y-p1.y)+t12*((p1.y-p0.y)/(t01+eps)-(p2.y-p0.y)/(t01+t12+eps));
    const m2x=(p2.x-p1.x)+t12*((p3.x-p2.x)/(t23+eps)-(p3.x-p1.x)/(t12+t23+eps));
    const m2y=(p2.y-p1.y)+t12*((p3.y-p2.y)/(t23+eps)-(p3.y-p1.y)/(t12+t23+eps));
    return {cp1:{x:p1.x+m1x/3,y:p1.y+m1y/3},cp2:{x:p2.x-m2x/3,y:p2.y-m2y/3}};
  }

  let path = 'M ' + all[0].x + ' ' + all[0].y;
  for (let i=0;i<all.length-1;i++) {
    const {cp1,cp2}=cr(all[Math.max(0,i-1)],all[i],all[i+1],all[Math.min(all.length-1,i+2)]);
    path += ' C '+cp1.x.toFixed(1)+' '+cp1.y.toFixed(1)+', '+cp2.x.toFixed(1)+' '+cp2.y.toFixed(1)+', '+all[i+1].x.toFixed(1)+' '+all[i+1].y.toFixed(1);
  }
  const area = path + ' L '+(W-pR)+' '+(pT+gH)+' L '+pL+' '+(pT+gH)+' Z';
  const si = LC_STAGES.indexOf(stage);
  const cp = pts[si];
  const sc = LC_COLORS[stage]||'#2980b9';

  let segs='', labs='', divs='';
  LC_STAGES.forEach((s,i) => {
    const x=pL+i*segW, cx=x+segW/2, col=LC_COLORS[s], isA=(i===si);
    segs += '<rect x="'+x+'" y="'+pT+'" width="'+segW+'" height="'+gH+'" fill="'+(isA?col:'transparent')+'" opacity="'+(isA?0.09:0)+'"/>';
    if(i>0) divs += '<line x1="'+x+'" y1="'+pT+'" x2="'+x+'" y2="'+(pT+gH)+'" stroke="#dde4ed" stroke-width="1" stroke-dasharray="3,2"/>';
    labs += '<text x="'+cx+'" y="'+(pT+gH+16)+'" text-anchor="middle" font-size="9.5" font-weight="'+(isA?700:500)+'" fill="'+(isA?col:'#9aa8b8')+'">'+s+'</text>';
    labs += '<text x="'+cx+'" y="'+(pT+gH+30)+'" text-anchor="middle" font-size="9.5" font-weight="'+(isA?700:400)+'" fill="'+(isA?col:'#b0bec5')+'">'+LC_ZH[s]+'</text>';
  });

  const dots = pts.map((p,i) => {
    const s=LC_STAGES[i], col=LC_COLORS[s], isA=(i===si);
    return '<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+(isA?7.5:3.5)+'" fill="'+(isA?col:'#ffffff')+'" stroke="'+col+'" stroke-width="'+(isA?0:2)+'" '+(isA?'filter="url(#glow)"':'')+'/>';
  }).join('');

  const lblW=100, lblH=22, lblX=(cp.x-lblW/2).toFixed(1), lblY=(cp.y-38).toFixed(1);

  return '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;max-width:680px;margin:0 auto;">' +
    '<defs>' +
    '<linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">' +
    LC_STAGES.map((s,i) => '<stop offset="'+(i/(LC_STAGES.length-1)*100).toFixed(0)+'%" stop-color="'+LC_COLORS[s]+'" stop-opacity="0.25"/>').join('') +
    '</linearGradient>' +
    '<filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>' +
    '</defs>' +
    segs + divs +
    '<line x1="'+pL+'" y1="'+(pT+gH)+'" x2="'+(W-pR)+'" y2="'+(pT+gH)+'" stroke="#d0dae6" stroke-width="1.5"/>' +
    '<path d="'+area+'" fill="url(#g1)" opacity="0.55"/>' +
    '<path d="'+path+'" fill="none" stroke="#2c3e50" stroke-width="2.2" stroke-linecap="round"/>' +
    dots +
    '<rect x="'+lblX+'" y="'+lblY+'" width="'+lblW+'" height="'+lblH+'" rx="11" fill="'+sc+'"/>' +
    '<text x="'+cp.x.toFixed(1)+'" y="'+(cp.y-23).toFixed(1)+'" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fff">▼ '+LC_ZH[stage]+'</text>' +
    labs + '</svg>';
}

function selectItem(id) {
  selectedId = id;
  renderList();
  const d = DATA.find(x => x.id === id);
  if (!d) return;

  const tb = d.type === '主動元件' ? 'badge-active' : d.type === '被動元件' ? 'badge-passive' : 'badge-other';
  const col = LC_COLORS[d.lifecycle]||'#2980b9';
  const lbl = LC_ZH[d.lifecycle]||d.lifecycle;

  const factors = FACTOR_KEYS.map((k,i) => {
    const text = (d.factors[k]||'—');
    return '<div class="factor-card" style="border-top-color:'+FACTOR_COLORS[i]+';">' +
      '<div class="factor-header">' +
        '<span class="factor-icon">'+FACTOR_ICONS[i]+'</span>' +
        '<div><div class="factor-name">'+k+'</div><div class="factor-en">'+FACTOR_EN[i]+'</div></div>' +
      '</div>' +
      '<div class="factor-text">'+text+'</div>' +
      '</div>';
  }).join('');

  document.getElementById('rightPanel').innerHTML =
    '<div class="detail-view">' +
      '<div class="detail-header">' +
        '<h2>'+d.displayName+'</h2>' +
        '<div class="meta">' +
          '<span class="badge '+tb+'">'+d.type+'</span>' +
          '<span class="badge" style="background:'+col+'22;color:'+col+';">&#128205; '+lbl+' ('+d.lifecycle+')</span>' +
        '</div>' +
      '</div>' +
      '<div class="lifecycle-card">' +
        '<div class="section-title">🔄 生命週期階段 (Lifecycle Stage)</div>' +
        '<div class="lifecycle-svg-wrap">'+buildSVG(d.lifecycle)+'</div>' +
        '<div class="stage-desc-box" style="border-left:3px solid '+col+';">' +
          '<strong style="color:'+col+';">'+lbl+' &nbsp;('+d.lifecycle+')</strong>' +
          '<p style="font-size:12.5px;color:#5a6a7e;margin-top:4px;">'+LC_DESC[d.lifecycle]+'</p>' +
        '</div>' +
      '</div>' +
      '<div class="section-title" style="margin-bottom:10px;">📋 七大影響因素分析 (7 Influence Factors)</div>' +
      '<div class="factors-grid">'+factors+'</div>' +
      '<div style="height:20px;"></div>' +
    '</div>';
}

renderList();
</script>
</body>
</html>
